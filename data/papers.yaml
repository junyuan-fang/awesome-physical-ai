#     authors: "Author1 et al."          (short form)
#     date: "YYYY-MM"                    (submission month)
#     category: vla                      (must match an id in categories.yaml)
#     tags: [foundation-model, manipulation]
#     abstract_short: "One-sentence summary."
#     links:
#       arxiv: "https://arxiv.org/abs/XXXX.XXXXX"
#       project: ""                      (optional)
#       code: ""                          (optional)
#       demo: ""                          (optional)
#     highlight: "🔥"                     (🔥 must-read / 👀 worth-knowing / blank)
#     added: "YYYY-MM-DD"
#     source: "seed"                     (seed / dailypaper / pr / manual)


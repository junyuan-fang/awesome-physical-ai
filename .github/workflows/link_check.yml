name: Link Check

on:
  schedule:
    - cron: "0 1 * * 0"   # Sundays 01:00 UTC
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in README
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            --exclude-path CONTRIBUTING.md
            README.md
          fail: false   # report but don't block; many arXiv links rate-limit CI
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md
          if-no-files-found: ignore
